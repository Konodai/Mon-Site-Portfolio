<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Portfolio MMI</title>
    <style>
		body
		{
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* Un gris très clair pour le fond */
        }
        header
		{
            background-color: #2c3e50; /* Une couleur bleu nuit élégante */
            padding: 20px;
            text-align: center;
            color: white;
        }
        nav
		{
            margin-top: 10px;
        }
		.btn
		{
            display: inline-block;
            text-decoration: none;
            background-color: #e67e22; /* Orange vif pour que ça ressorte */
            color: white;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px; /* Bords un peu arrondis */
            transition: transform 0.3s ease; /* Animation fluide de 0.3 secondes */
        }
        .btn:hover
		{
            transform: scale(1.1); /* Agrandit le bouton de 10% */
            background-color: #d35400; /* Change un peu la couleur au survol */
        }
        .contenu
		{
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mon Portfolio pour le BUT MMI</h1>
        <nav>
            <a href="index.html" class="btn">Accueil</a>
            <a href="projets.html" class="btn">Mes Projets</a>
            <a href="moncv.html" class="btn">Mon CV</a>
        </nav>
    </header>

    <div class="contenu">
        <p><strong>MON CV</strong></p>
		<style>
			p
			{
				font-size: 2.0rem;
				font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
				max-width: 500px;
				margin: 20px auto;
				text-align: center;
				line-height: 1.2;
				color: #333333;
				background-color: #f9f9f9;
				padding: 40px;
				border-radius: 12px;
				border: 1px solid #eeeeee;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
			}
		</style>
        <img class="Mon CV" src="Images2/Mon CV.jpg" width="600">
    </div>

</body>
</html>
